<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | My Halo Auto</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      text-align: center;
      padding: 24px;
    }
    .container { max-width: 560px; }
    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: 120px;
      font-weight: 800;
      color: #c8a54e;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      margin-bottom: 16px;
    }
    p {
      color: #999;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #c8a54e, #a88a3a);
      color: #0a0a0a;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200, 165, 78, 0.2);
    }
    .links {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    .links a {
      color: #c8a54e;
      text-decoration: none;
      font-size: 14px;
    }
    .links a:hover { color: #e8d391; }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn"><i class="fas fa-home"></i> Back to Home</a>
    <div class="links">
      <a href="/#services">Services</a>
      <a href="/#contact">Contact Us</a>
      <a href="tel:+15719694256">Call (571) 969-4256</a>
    </div>
  </div>
</body>
</html>
